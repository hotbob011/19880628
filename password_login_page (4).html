<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>登录验证</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            -webkit-text-size-adjust: 100%;
            background-color: #000000;
            background-image: url('shan-liang-de-jin-se-li-zi-you-guang-xian.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: scroll; /* avoid iOS jank */
            min-height: 100vh;
            min-height: 100svh; /* better for mobile dynamic bars */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        
        .page-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 0 20px;
        }
        
        .main-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #007aff;
            text-shadow: 0 3px 6px rgba(0, 122, 255, 0.3);
            letter-spacing: 2px;
            line-height: 1.2;
        }
        
        .sub-title {
            font-size: 22px;
            font-weight: 500;
            color: #007aff;
            text-shadow: 0 2px 4px rgba(0, 122, 255, 0.3);
            letter-spacing: 1.5px;
            line-height: 1.3;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .login-modal {
            background: #ffffff;
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            margin: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            position: relative;
        }
        
        .modal-header {
            text-align: center;
            padding: 40px 30px 20px 30px;
        }
        
        .info-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #ffffff;
            border: 3px solid #5ac8fa;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
            font-size: 28px;
            color: #5ac8fa;
            font-weight: bold;
        }
        
        .welcome-text {
            color: #333333;
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 30px;
        }
        
        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            padding: 0 30px;
            flex-wrap: wrap; /* avoid overflow on narrow screens */
        }
        
        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 15px;
            background: #5ac8fa;
            color: #ffffff;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-family: inherit;
            min-height: 44px; /* larger tap target */
            touch-action: manipulation;
        }
        
        .action-btn:hover {
            background: #32a9e8;
            transform: translateY(-1px);
        }
        
        .action-btn:active {
            transform: translateY(0);
        }
        
        .btn-icon {
            width: 18px;
            height: 18px;
            background: #ffffff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            color: #5ac8fa;
        }
        
        .modal-body {
            padding: 0 30px 30px 30px;
        }
        
        .password-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e5e5e7;
            border-radius: 8px;
            font-size: 16px;
            background: #ffffff;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.3s ease;
        }
        
        .password-input:focus {
            border-color: #5ac8fa;
        }
        
        .password-input::placeholder {
            color: #c7c7cc;
        }
        
        .button-row {
            display: flex;
            gap: 10px;
        }
        
        .confirm-btn {
            flex: 1;
            padding: 12px;
            background: #007aff;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        
        .confirm-btn:hover {
            background: #0056cc;
        }
        
        .cancel-btn {
            flex: 1;
            padding: 12px;
            background: #ff3b30;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        
        .cancel-btn:hover {
            background: #d70015;
        }
        
        .error-message {
            color: #ff3b30;
            font-size: 14px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
        }
        
        .success-message {
            color: #34c759;
            font-size: 14px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
        }
        
        .success-screen {
            display: none;
            text-align: center;
            padding: 40px 30px;
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #34c759;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px auto;
            font-size: 36px;
            color: #34c759;
            background: #ffffff;
        }
        
        .success-text {
            color: #333333;
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 30px;
        }
        
        .enter-btn {
            background: #5d6aff;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .enter-btn:hover {
            background: #4c59e8;
            transform: translateY(-1px);
        }

        /* Larger tap targets for primary buttons */
        .confirm-btn, .cancel-btn, .enter-btn {
            min-height: 44px;
            touch-action: manipulation;
        }

        /* Attach fixed background only on larger screens to avoid mobile repaint issues */
        @media (min-width: 769px) {
            body { background-attachment: fixed; }
        }
        
        @media (max-width: 768px) {
            .main-title {
                font-size: 28px;
                letter-spacing: 1.5px;
            }
            
            .sub-title {
                font-size: 19px;
                letter-spacing: 1.2px;
            }
        }
        
        /* 移动端适配 */
        @media (max-width: 480px) {
            .page-header {
                margin-bottom: 30px;
                padding: 0 15px;
            }
            
            .main-title {
                font-size: 26px;
                letter-spacing: 1px;
            }
            
            .sub-title {
                font-size: 18px;
                letter-spacing: 1px;
            }
            
            .login-modal {
                margin: 15px;
            }
            
            .modal-header {
                padding: 30px 20px 15px 20px;
            }
            
            .welcome-text {
                font-size: 18px;
            }
            
            .button-group {
                padding: 0 20px;
                gap: 10px;
                flex-direction: column;
            }
            
            .action-btn {
                font-size: 13px;
                padding: 8px 12px;
                width: 100%;
            }
            
            .modal-body {
                padding: 0 20px 20px 20px;
            }

            .button-row {
                flex-direction: column;
                gap: 8px;
            }

            .confirm-btn, .cancel-btn {
                width: 100%;
            }
        }
        
        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="modal-overlay" style="padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);">
        <!-- 页面标题 -->
        <div class="page-header">
            <div class="main-title">苹果小火箭ID分享</div>
            <div class="sub-title">免费VPN&节点分享</div>
        </div>
        
        <div class="login-modal">
            <!-- 登录界面 -->
            <div class="login-content" id="loginContent">
                <div class="modal-header">
                    <div class="info-icon">i</div>
                    <div class="welcome-text">欢迎！</div>
                    
                    <div class="button-group">
                        <button class="action-btn" id="getPasswordBtn">
                            <div class="btn-icon">📱</div>
                            加群获取密码
                        </button>
                        <button class="action-btn" id="getTutorialBtn">
                            <div class="btn-icon">📖</div>
                            密码使用教程
                        </button>
                    </div>
                </div>
                
                <div class="modal-body">
                    <div class="error-message" id="errorMessage"></div>
                    <div class="success-message" id="successMessage"></div>
                    
                    <input 
                        type="password" 
                        class="password-input" 
                        id="passwordInput" 
                        placeholder="请输入密码"
                        autocomplete="current-password"
                        autocapitalize="off"
                        autocorrect="off"
                        enterkeyhint="go"
                        spellcheck="false"
                    >
                    
                    <div class="button-row">
                        <button class="confirm-btn" id="confirmBtn">确认</button>
                        <button class="cancel-btn" id="cancelBtn">鉴黄联盟</button>
                    </div>
                </div>
            </div>

            <!-- 成功界面 -->
            <div class="success-screen" id="successScreen">
                <div class="success-icon">✓</div>
                <div class="success-text">密码正确</div>
                <button class="enter-btn" id="enterBtn">进入</button>
            </div>
        </div>
    </div>

    <script>
        // 元素引用
        const getPasswordBtn = document.getElementById('getPasswordBtn');
        const getTutorialBtn = document.getElementById('getTutorialBtn');
        const passwordInput = document.getElementById('passwordInput');
        const confirmBtn = document.getElementById('confirmBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loginContent = document.getElementById('loginContent');
        const successScreen = document.getElementById('successScreen');
        const enterBtn = document.getElementById('enterBtn');

        // 正确的密码（请根据实际需要修改）
        const correctPassword = "123456";

        // 获取密码按钮点击事件
        getPasswordBtn.addEventListener('click', function() {
            // 直接跳转到Telegram群组
            window.open('https://t.me/baipiao365', '_blank');
        });

        // 获取教程按钮点击事件
        getTutorialBtn.addEventListener('click', function() {
            // 直接跳转到Telegram教程群组
            window.open('https://t.me/baipiao369', '_blank');
        });

        // 确认按钮点击事件
        confirmBtn.addEventListener('click', function() {
            const password = passwordInput.value.trim();
            
            if (!password) {
                showError('请输入密码');
                return;
            }

            // 显示加载状态
            confirmBtn.disabled = true;
            confirmBtn.innerHTML = '<span class="loading"></span>验证中...';
            
            // 隐藏之前的消息
            hideMessages();
            
            // 模拟验证过程
            setTimeout(() => {
                if (password === correctPassword) {
                    // 验证成功 - 显示成功界面
                    confirmBtn.innerHTML = '验证成功';
                    
                    // 延迟显示成功界面
                    setTimeout(() => {
                        showSuccessScreen();
                    }, 500);
                } else {
                    // 验证失败
                    showError('密码错误，请检查后重新输入');
                    passwordInput.focus();
                }
            }, 1000);
        });

        // 取消按钮点击事件
        cancelBtn.addEventListener('click', function() {
            // 直接跳转到指定的Telegram链接
            window.open('https://t.me/xxoo369', '_blank');
        });

        // 回车键提交
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !confirmBtn.disabled) {
                confirmBtn.click();
            }
        });

        // 输入时隐藏错误消息
        passwordInput.addEventListener('input', function() {
            hideMessages();
        });

        // 显示错误消息
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
            resetForm();
        }

        // 显示成功消息
        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';
        }

        // 隐藏所有消息
        function hideMessages() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
        }

        // 重置表单状态
        function resetForm() {
            confirmBtn.disabled = false;
            confirmBtn.textContent = '确认';
        }

        // 显示成功界面
        function showSuccessScreen() {
            loginContent.style.display = 'none';
            successScreen.style.display = 'block';
        }

        // 进入按钮点击事件
        enterBtn.addEventListener('click', function() {
            // 这里添加跳转到主页面的逻辑
            // window.location.href = 'main.html';
            alert('正在进入网站...');
        });

        // 页面加载完成后聚焦到密码输入框
        window.addEventListener('load', function() {
            passwordInput.focus();
        });
    </script>
</body>
</html>
